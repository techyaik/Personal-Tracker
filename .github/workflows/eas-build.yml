name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform (Android, iOS, or all)'
        required: true
        default: 'android'
        type: choice
        options:
          - 'android'
          - 'ios'
          - 'all'
      profile:
        description: 'EAS build profile (defined in eas.json)'
        required: true
        default: 'preview'
        type: choice
        options:
          - 'development'
          - 'preview'
          - 'production'

jobs:
  build:
    name: Expo EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo / EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build App (Local)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ${{ github.event.inputs.platform }} --profile ${{ github.event.inputs.profile }} --local --non-interactive

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-outputs-${{ github.event.inputs.platform }}-${{ github.event.inputs.profile }}
          path: |
            *.apk
            *.aab
            *.ipa
            dist/
          if-no-files-found: warn

